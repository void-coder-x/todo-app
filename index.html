<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart To-Do App</title>
  <meta name="google-site-verification" content="qRQLGX3j48VAKNOfhPrlj4eztNoNsw9CmM1EE-HW2Z8" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>To-Do List</h1>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Task">
      <input type="date" id="dateInput">
      <input type="time" id="timeInput">
      <button onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
